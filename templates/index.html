<!DOCTYPE html>
<html>
<head>
<title>Omni AI</title>
<style>
body {background:#0b0f1a;color:white;font-family:Arial;}
.chat {height:400px;overflow:auto;border:1px solid #333;padding:10px;}
.msg {margin:10px;padding:10px;border-radius:10px;}
.user {background:#1e293b;text-align:right;}
.ai {background:#0f172a;}
</style>
</head>

<body>

<h2>👑 Omni AI (Vercel)</h2>

<div id="chat" class="chat"></div>

<input id="input">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>

<script>
function add(text, type){
 let div=document.createElement("div");
 div.className="msg "+type;
 div.innerText=text;
 document.getElementById("chat").appendChild(div);
}

async function send(){
 let text=document.getElementById("input").value;
 if(!text) return;

 add(text,"user");

 let res=await fetch("/api/chat",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({message:text})
 });

 let data=await res.json();

 add(data.reply,"ai");

 speak(data.reply);
}

function voice(){
 let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.lang="hi-IN";
 rec.onresult=e=>{
   let t=e.results[0][0].transcript;
   document.getElementById("input").value=t;
   send();
 };
 rec.start();
}

function speak(text){
 let s=new SpeechSynthesisUtterance(text);
 s.lang="hi-IN";
 speechSynthesis.speak(s);
}
</script>

</body>
</html>
