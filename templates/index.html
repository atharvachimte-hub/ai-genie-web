<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Omni AI</title>

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: Arial;
}

#chat {
    width: 60%;
    margin: auto;
    margin-top: 50px;
}

.message {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}

.user {
    background: #1e2a3a;
    text-align: right;
}

.ai {
    background: #0f172a;
    text-align: left;
}

input {
    width: 80%;
    padding: 10px;
}

button {
    padding: 10px;
}
</style>
</head>

<body>

<div id="chat"></div>

<div style="text-align:center;">
    <input id="input" placeholder="Type something bhava..." />
    <button onclick="send()">Send</button>
</div>

<script>
function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chat.appendChild(div);
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;

    if (!text) return;

    // 👤 User message
    addMessage(text, "user");

    input.value = "";

    // 🔥 AI CALL
    const response = await fetch("/ai", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    });

    const data = await response.json();

    // 🤖 AI reply
    addMessage(data.reply, "ai");
}
</script>

</body>
</html>
